<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Tailor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #08081a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .mono {
            font-family: 'Space Mono', monospace;
        }

        :root {
            --gradient-start: #6366f1;
            --gradient-end: #8b5cf6;
            --positive: #34d399;
            --negative: #f87171;
            --warning: #fbbf24;
            --bg-primary: #08081a;
            --bg-secondary: #0f0f23;
            --bg-tertiary: #1a1a2e;
            --border: #2a2a4a;
        }

        #root {
            min-height: 100vh;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-border {
            position: relative;
        }

        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: inherit;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gradient-start);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, useCallback } = React;

        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // System prompt for the AI
        const SYSTEM_PROMPT = `You are an expert resume consultant. Your job is to tailor a resume to match a specific job description.

CRITICAL RULES:
1. NEVER fabricate skills, experiences, metrics, or achievements
2. NEVER inflate numbers or add fake statistics
3. NEVER invent job titles, companies, or responsibilities
4. You can ONLY: reword existing content, reorder sections, emphasize relevant skills, remove irrelevant content, and improve phrasing

Analyze the resume against the job description and return a JSON response with this exact structure:
{
    "matchScore": <number 0-100>,
    "summary": "<brief analysis of fit>",
    "suggestedChanges": [
        {
            "section": "<section name>",
            "before": "<original text>",
            "after": "<improved text>",
            "reasoning": "<why this change helps>"
        }
    ],
    "keywordAnalysis": {
        "matched": ["<keywords from JD found in resume>"],
        "missing": ["<important JD keywords not in resume>"]
    },
    "skillGaps": "<honest assessment of real gaps between candidate and job requirements>",
    "tailoredResume": {
        "name": "<candidate name>",
        "contact": "<email, phone, location, linkedin>",
        "professionalSummary": "<tailored 2-3 sentence summary>",
        "sections": [
            {
                "title": "<section name like Experience, Education, Skills>",
                "items": [
                    {
                        "title": "<job title or degree>",
                        "subtitle": "<company or institution>",
                        "date": "<date range>",
                        "bullets": ["<achievement 1>", "<achievement 2>"]
                    }
                ]
            }
        ]
    }
}

Return ONLY valid JSON, no markdown code blocks or additional text.`;

        // Upload Zone Component
        function UploadZone({ onFileProcessed, resumeText, fileName }) {
            const [isDragging, setIsDragging] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [error, setError] = useState(null);
            const fileInputRef = useRef(null);

            const extractTextFromPDF = async (file) => {
                setIsProcessing(true);
                setError(null);
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let fullText = '';

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(' ');
                        fullText += pageText + '\n';
                    }

                    onFileProcessed(fullText.trim(), file.name);
                } catch (err) {
                    setError('Failed to extract text from PDF. Please try another file.');
                    console.error(err);
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleDrop = useCallback((e) => {
                e.preventDefault();
                setIsDragging(false);
                const file = e.dataTransfer.files[0];
                if (file && file.type === 'application/pdf') {
                    extractTextFromPDF(file);
                } else {
                    setError('Please upload a PDF file');
                }
            }, []);

            const handleDragOver = useCallback((e) => {
                e.preventDefault();
                setIsDragging(true);
            }, []);

            const handleDragLeave = useCallback((e) => {
                e.preventDefault();
                setIsDragging(false);
            }, []);

            const handleClick = () => {
                fileInputRef.current?.click();
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file && file.type === 'application/pdf') {
                    extractTextFromPDF(file);
                } else if (file) {
                    setError('Please upload a PDF file');
                }
            };

            return (
                <div
                    onClick={handleClick}
                    onDrop={handleDrop}
                    onDragOver={handleDragOver}
                    onDragLeave={handleDragLeave}
                    style={{
                        border: `2px dashed ${isDragging ? '#6366f1' : resumeText ? '#34d399' : '#2a2a4a'}`,
                        borderRadius: '12px',
                        padding: '40px 20px',
                        textAlign: 'center',
                        cursor: 'pointer',
                        background: isDragging ? 'rgba(99, 102, 241, 0.1)' : resumeText ? 'rgba(52, 211, 153, 0.1)' : 'rgba(15, 15, 35, 0.5)',
                        transition: 'all 0.3s ease',
                        marginBottom: '20px'
                    }}
                >
                    <input
                        ref={fileInputRef}
                        type="file"
                        accept=".pdf"
                        onChange={handleFileChange}
                        style={{ display: 'none' }}
                    />

                    {isProcessing ? (
                        <div>
                            <div className="animate-spin" style={{
                                width: '40px',
                                height: '40px',
                                border: '3px solid #2a2a4a',
                                borderTop: '3px solid #6366f1',
                                borderRadius: '50%',
                                margin: '0 auto 16px'
                            }}></div>
                            <p style={{ color: '#94a3b8' }}>Extracting text from PDF...</p>
                        </div>
                    ) : resumeText ? (
                        <div>
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" style={{ margin: '0 auto 16px', display: 'block' }}>
                                <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#34d399" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                            </svg>
                            <p style={{ color: '#34d399', fontWeight: '500' }}>{fileName}</p>
                            <p style={{ color: '#94a3b8', fontSize: '14px', marginTop: '8px' }}>Click or drag to replace</p>
                        </div>
                    ) : (
                        <div>
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" style={{ margin: '0 auto 16px', display: 'block' }}>
                                <path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" stroke="#6366f1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                            </svg>
                            <p style={{ color: '#e2e8f0', fontWeight: '500', marginBottom: '8px' }}>
                                Drop your resume PDF here
                            </p>
                            <p style={{ color: '#94a3b8', fontSize: '14px' }}>or click to browse</p>
                        </div>
                    )}

                    {error && (
                        <p style={{ color: '#f87171', marginTop: '12px', fontSize: '14px' }}>{error}</p>
                    )}
                </div>
            );
        }

        // Circular Gauge Component
        function CircularGauge({ score, size = 160 }) {
            const [animatedScore, setAnimatedScore] = useState(0);
            const radius = (size - 20) / 2;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (animatedScore / 100) * circumference;

            useEffect(() => {
                const duration = 1500;
                const startTime = Date.now();
                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    setAnimatedScore(Math.round(score * easeOut));
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    }
                };
                animate();
            }, [score]);

            const getColor = () => {
                if (animatedScore >= 70) return '#34d399';
                if (animatedScore >= 40) return '#fbbf24';
                return '#f87171';
            };

            return (
                <div style={{ position: 'relative', width: size, height: size }}>
                    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
                        <circle
                            cx={size / 2}
                            cy={size / 2}
                            r={radius}
                            fill="none"
                            stroke="#1a1a2e"
                            strokeWidth="10"
                        />
                        <circle
                            cx={size / 2}
                            cy={size / 2}
                            r={radius}
                            fill="none"
                            stroke={getColor()}
                            strokeWidth="10"
                            strokeLinecap="round"
                            strokeDasharray={circumference}
                            strokeDashoffset={strokeDashoffset}
                            style={{ transition: 'stroke-dashoffset 0.1s ease-out' }}
                        />
                    </svg>
                    <div style={{
                        position: 'absolute',
                        inset: 0,
                        display: 'flex',
                        flexDirection: 'column',
                        alignItems: 'center',
                        justifyContent: 'center'
                    }}>
                        <span className="mono" style={{ fontSize: '36px', fontWeight: '700', color: getColor() }}>
                            {animatedScore}
                        </span>
                        <span style={{ fontSize: '14px', color: '#94a3b8' }}>Match Score</span>
                    </div>
                </div>
            );
        }

        // Keyword Pills Component
        function KeywordPills({ matched, missing }) {
            return (
                <div style={{ marginBottom: '24px' }}>
                    <div style={{ marginBottom: '16px' }}>
                        <h4 style={{ fontSize: '14px', color: '#94a3b8', marginBottom: '8px', textTransform: 'uppercase', letterSpacing: '1px' }}>
                            Matched Keywords
                        </h4>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                            {matched.map((keyword, i) => (
                                <span key={i} style={{
                                    padding: '6px 12px',
                                    borderRadius: '20px',
                                    fontSize: '13px',
                                    background: 'rgba(52, 211, 153, 0.15)',
                                    color: '#34d399',
                                    border: '1px solid rgba(52, 211, 153, 0.3)'
                                }}>
                                    {keyword}
                                </span>
                            ))}
                            {matched.length === 0 && <span style={{ color: '#64748b', fontSize: '14px' }}>None found</span>}
                        </div>
                    </div>
                    <div>
                        <h4 style={{ fontSize: '14px', color: '#94a3b8', marginBottom: '8px', textTransform: 'uppercase', letterSpacing: '1px' }}>
                            Missing Keywords
                        </h4>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                            {missing.map((keyword, i) => (
                                <span key={i} style={{
                                    padding: '6px 12px',
                                    borderRadius: '20px',
                                    fontSize: '13px',
                                    background: 'rgba(248, 113, 113, 0.15)',
                                    color: '#f87171',
                                    border: '1px solid rgba(248, 113, 113, 0.3)'
                                }}>
                                    {keyword}
                                </span>
                            ))}
                            {missing.length === 0 && <span style={{ color: '#64748b', fontSize: '14px' }}>None - great match!</span>}
                        </div>
                    </div>
                </div>
            );
        }

        // Change Card Component
        function ChangeCard({ change }) {
            return (
                <div style={{
                    background: '#0f0f23',
                    borderRadius: '12px',
                    padding: '20px',
                    marginBottom: '16px',
                    border: '1px solid #2a2a4a'
                }}>
                    <div style={{ marginBottom: '12px' }}>
                        <span style={{
                            padding: '4px 10px',
                            borderRadius: '6px',
                            fontSize: '12px',
                            background: 'rgba(99, 102, 241, 0.2)',
                            color: '#818cf8',
                            fontWeight: '500'
                        }}>
                            {change.section}
                        </span>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '12px' }}>
                        <div>
                            <p style={{ fontSize: '12px', color: '#f87171', marginBottom: '6px', textTransform: 'uppercase' }}>Before</p>
                            <p style={{ fontSize: '14px', color: '#94a3b8', lineHeight: '1.6', background: 'rgba(248, 113, 113, 0.05)', padding: '12px', borderRadius: '8px', borderLeft: '3px solid #f87171' }}>
                                {change.before}
                            </p>
                        </div>
                        <div>
                            <p style={{ fontSize: '12px', color: '#34d399', marginBottom: '6px', textTransform: 'uppercase' }}>After</p>
                            <p style={{ fontSize: '14px', color: '#e2e8f0', lineHeight: '1.6', background: 'rgba(52, 211, 153, 0.05)', padding: '12px', borderRadius: '8px', borderLeft: '3px solid #34d399' }}>
                                {change.after}
                            </p>
                        </div>
                    </div>
                    <p style={{ fontSize: '13px', color: '#94a3b8', fontStyle: 'italic' }}>
                        💡 {change.reasoning}
                    </p>
                </div>
            );
        }

        // Resume Preview Component
        function ResumePreview({ resume }) {
            if (!resume) return null;

            return (
                <div style={{
                    background: '#fff',
                    color: '#1a1a2e',
                    padding: '40px',
                    borderRadius: '12px',
                    maxWidth: '800px',
                    margin: '0 auto',
                    fontFamily: 'Outfit, sans-serif'
                }}>
                    <h1 style={{ textAlign: 'center', fontSize: '28px', marginBottom: '8px', color: '#08081a' }}>
                        {resume.name}
                    </h1>
                    <p style={{ textAlign: 'center', color: '#64748b', fontSize: '14px', marginBottom: '16px' }}>
                        {resume.contact}
                    </p>
                    <hr style={{ border: 'none', borderTop: '2px solid #6366f1', marginBottom: '24px' }} />

                    <p style={{ fontStyle: 'italic', color: '#475569', lineHeight: '1.6', marginBottom: '24px' }}>
                        {resume.professionalSummary}
                    </p>

                    {resume.sections?.map((section, i) => (
                        <div key={i} style={{ marginBottom: '24px' }}>
                            <h2 style={{ fontSize: '18px', color: '#6366f1', borderBottom: '1px solid #e2e8f0', paddingBottom: '8px', marginBottom: '16px' }}>
                                {section.title}
                            </h2>
                            {section.items?.map((item, j) => (
                                <div key={j} style={{ marginBottom: '16px' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '4px' }}>
                                        <strong style={{ color: '#1e293b' }}>{item.title}</strong>
                                        <span style={{ color: '#64748b', fontSize: '14px' }}>{item.date}</span>
                                    </div>
                                    {item.subtitle && (
                                        <p style={{ color: '#475569', fontSize: '14px', marginBottom: '8px' }}>{item.subtitle}</p>
                                    )}
                                    {item.bullets && (
                                        <ul style={{ marginLeft: '20px', color: '#334155' }}>
                                            {item.bullets.map((bullet, k) => (
                                                <li key={k} style={{ marginBottom: '4px', lineHeight: '1.5' }}>{bullet}</li>
                                            ))}
                                        </ul>
                                    )}
                                </div>
                            ))}
                        </div>
                    ))}
                </div>
            );
        }

        // PDF Download Function
        function downloadPDF(resume) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.getWidth();
            const margin = 20;
            let y = 20;

            // Name centered at top
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(24);
            doc.setTextColor(8, 8, 26);
            doc.text(resume.name, pageWidth / 2, y, { align: 'center' });
            y += 10;

            // Contact info
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.setTextColor(100, 116, 139);
            doc.text(resume.contact, pageWidth / 2, y, { align: 'center' });
            y += 8;

            // Divider
            doc.setDrawColor(99, 102, 241);
            doc.setLineWidth(0.5);
            doc.line(margin, y, pageWidth - margin, y);
            y += 12;

            // Professional Summary (italics)
            doc.setFont('helvetica', 'italic');
            doc.setFontSize(11);
            doc.setTextColor(71, 85, 105);
            const summaryLines = doc.splitTextToSize(resume.professionalSummary, pageWidth - 2 * margin);
            doc.text(summaryLines, margin, y);
            y += summaryLines.length * 6 + 12;

            // Sections
            resume.sections?.forEach(section => {
                // Check if we need a new page
                if (y > 260) {
                    doc.addPage();
                    y = 20;
                }

                // Section heading (blue)
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(14);
                doc.setTextColor(99, 102, 241);
                doc.text(section.title, margin, y);
                y += 8;

                doc.setDrawColor(226, 232, 240);
                doc.setLineWidth(0.2);
                doc.line(margin, y, pageWidth - margin, y);
                y += 8;

                section.items?.forEach(item => {
                    if (y > 270) {
                        doc.addPage();
                        y = 20;
                    }

                    // Item title and date
                    doc.setFont('helvetica', 'bold');
                    doc.setFontSize(11);
                    doc.setTextColor(30, 41, 59);
                    doc.text(item.title, margin, y);

                    if (item.date) {
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(10);
                        doc.setTextColor(100, 116, 139);
                        doc.text(item.date, pageWidth - margin, y, { align: 'right' });
                    }
                    y += 5;

                    // Subtitle (company/institution)
                    if (item.subtitle) {
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(10);
                        doc.setTextColor(71, 85, 105);
                        doc.text(item.subtitle, margin, y);
                        y += 5;
                    }

                    // Bullets
                    if (item.bullets) {
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(10);
                        doc.setTextColor(51, 65, 85);
                        item.bullets.forEach(bullet => {
                            if (y > 270) {
                                doc.addPage();
                                y = 20;
                            }
                            const bulletLines = doc.splitTextToSize(`• ${bullet}`, pageWidth - 2 * margin - 5);
                            doc.text(bulletLines, margin + 5, y);
                            y += bulletLines.length * 5 + 2;
                        });
                    }
                    y += 6;
                });
                y += 4;
            });

            doc.save('tailored-resume.pdf');
        }

        // Main App Component
        function App() {
            const [resumeText, setResumeText] = useState('');
            const [fileName, setFileName] = useState('');
            const [jobDescription, setJobDescription] = useState('');
            const [apiKey, setApiKey] = useState('');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [results, setResults] = useState(null);
            const [error, setError] = useState(null);
            const [activeTab, setActiveTab] = useState('analysis');

            const handleFileProcessed = (text, name) => {
                setResumeText(text);
                setFileName(name);
                setError(null);
            };

            const analyzeResume = async () => {
                if (!resumeText || !jobDescription || !apiKey) {
                    setError('Please provide your resume, job description, and API key.');
                    return;
                }

                setIsAnalyzing(true);
                setError(null);
                setResults(null);

                try {
                    // Use local proxy server to bypass CORS
                    const response = await fetch('/api/anthropic', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            api_key: apiKey,
                            payload: {
                                model: 'claude-sonnet-4-20250514',
                                max_tokens: 4096,
                                system: SYSTEM_PROMPT,
                                messages: [{
                                    role: 'user',
                                    content: `RESUME:\n${resumeText}\n\nJOB DESCRIPTION:\n${jobDescription}`
                                }]
                            }
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error?.message || `API request failed: ${response.status}`);
                    }

                    const data = await response.json();
                    const content = data.content[0].text;

                    // Parse JSON response
                    const jsonMatch = content.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) {
                        throw new Error('Invalid response format from API');
                    }

                    const parsed = JSON.parse(jsonMatch[0]);
                    setResults(parsed);
                    setActiveTab('analysis');
                } catch (err) {
                    setError(err.message || 'Failed to analyze resume. Please check your API key and try again.');
                    console.error(err);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            return (
                <div style={{ minHeight: '100vh', padding: '40px 20px' }}>
                    <div style={{ maxWidth: '1200px', margin: '0 auto' }}>
                        {/* Header */}
                        <header style={{ textAlign: 'center', marginBottom: '48px' }}>
                            <h1 style={{ fontSize: '48px', fontWeight: '700', marginBottom: '12px' }}>
                                <span className="gradient-text">Resume Tailor</span>
                            </h1>
                            <p style={{ color: '#94a3b8', fontSize: '18px' }}>
                                AI-powered resume optimization — honest, no fabrication
                            </p>
                        </header>

                        {/* Input Section */}
                        {!results && (
                            <div style={{ maxWidth: '800px', margin: '0 auto' }}>
                                {/* API Key Input */}
                                <div style={{ marginBottom: '24px' }}>
                                    <label style={{ display: 'block', marginBottom: '8px', color: '#94a3b8', fontSize: '14px' }}>
                                        Anthropic API Key
                                    </label>
                                    <input
                                        type="password"
                                        value={apiKey}
                                        onChange={(e) => setApiKey(e.target.value)}
                                        placeholder="sk-ant-..."
                                        style={{
                                            width: '100%',
                                            padding: '14px 16px',
                                            borderRadius: '10px',
                                            border: '1px solid #2a2a4a',
                                            background: '#0f0f23',
                                            color: '#e2e8f0',
                                            fontSize: '15px',
                                            fontFamily: 'Space Mono, monospace'
                                        }}
                                    />
                                    <p style={{ fontSize: '12px', color: '#64748b', marginTop: '6px' }}>
                                        Your API key is never stored and only used for this session
                                    </p>
                                </div>

                                {/* Resume Upload */}
                                <UploadZone
                                    onFileProcessed={handleFileProcessed}
                                    resumeText={resumeText}
                                    fileName={fileName}
                                />

                                {/* Job Description */}
                                <div style={{ marginBottom: '24px' }}>
                                    <label style={{ display: 'block', marginBottom: '8px', color: '#94a3b8', fontSize: '14px' }}>
                                        Job Description
                                    </label>
                                    <textarea
                                        value={jobDescription}
                                        onChange={(e) => setJobDescription(e.target.value)}
                                        placeholder="Paste the job description here..."
                                        rows={8}
                                        style={{
                                            width: '100%',
                                            padding: '16px',
                                            borderRadius: '10px',
                                            border: '1px solid #2a2a4a',
                                            background: '#0f0f23',
                                            color: '#e2e8f0',
                                            fontSize: '15px',
                                            resize: 'vertical',
                                            lineHeight: '1.6'
                                        }}
                                    />
                                </div>

                                {/* Analyze Button */}
                                <button
                                    onClick={analyzeResume}
                                    disabled={isAnalyzing || !resumeText || !jobDescription || !apiKey}
                                    style={{
                                        width: '100%',
                                        padding: '16px 32px',
                                        borderRadius: '10px',
                                        border: 'none',
                                        background: isAnalyzing || !resumeText || !jobDescription || !apiKey
                                            ? '#2a2a4a'
                                            : 'linear-gradient(135deg, #6366f1, #8b5cf6)',
                                        color: '#fff',
                                        fontSize: '16px',
                                        fontWeight: '600',
                                        cursor: isAnalyzing || !resumeText || !jobDescription || !apiKey ? 'not-allowed' : 'pointer',
                                        display: 'flex',
                                        alignItems: 'center',
                                        justifyContent: 'center',
                                        gap: '10px'
                                    }}
                                >
                                    {isAnalyzing ? (
                                        <>
                                            <div className="animate-spin" style={{
                                                width: '20px',
                                                height: '20px',
                                                border: '2px solid rgba(255,255,255,0.3)',
                                                borderTop: '2px solid #fff',
                                                borderRadius: '50%'
                                            }}></div>
                                            Analyzing...
                                        </>
                                    ) : (
                                        'Tailor My Resume'
                                    )}
                                </button>

                                {error && (
                                    <div style={{
                                        marginTop: '16px',
                                        padding: '16px',
                                        borderRadius: '10px',
                                        background: 'rgba(248, 113, 113, 0.1)',
                                        border: '1px solid rgba(248, 113, 113, 0.3)',
                                        color: '#f87171'
                                    }}>
                                        {error}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Results Section */}
                        {results && (
                            <div>
                                {/* Back Button */}
                                <button
                                    onClick={() => setResults(null)}
                                    style={{
                                        marginBottom: '24px',
                                        padding: '10px 20px',
                                        borderRadius: '8px',
                                        border: '1px solid #2a2a4a',
                                        background: 'transparent',
                                        color: '#94a3b8',
                                        cursor: 'pointer',
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '8px'
                                    }}
                                >
                                    ← Analyze Another Resume
                                </button>

                                {/* Tabs */}
                                <div style={{ display: 'flex', gap: '8px', marginBottom: '24px' }}>
                                    {['analysis', 'preview'].map(tab => (
                                        <button
                                            key={tab}
                                            onClick={() => setActiveTab(tab)}
                                            style={{
                                                padding: '12px 24px',
                                                borderRadius: '8px',
                                                border: 'none',
                                                background: activeTab === tab ? 'linear-gradient(135deg, #6366f1, #8b5cf6)' : '#1a1a2e',
                                                color: activeTab === tab ? '#fff' : '#94a3b8',
                                                cursor: 'pointer',
                                                fontWeight: '500',
                                                textTransform: 'capitalize'
                                            }}
                                        >
                                            {tab}
                                        </button>
                                    ))}
                                </div>

                                {activeTab === 'analysis' && (
                                    <div style={{ display: 'grid', gridTemplateColumns: '300px 1fr', gap: '32px' }}>
                                        {/* Left Sidebar */}
                                        <div>
                                            {/* Match Score */}
                                            <div style={{
                                                background: '#0f0f23',
                                                borderRadius: '16px',
                                                padding: '24px',
                                                border: '1px solid #2a2a4a',
                                                marginBottom: '24px',
                                                display: 'flex',
                                                flexDirection: 'column',
                                                alignItems: 'center'
                                            }}>
                                                <CircularGauge score={results.matchScore} />
                                                <p style={{ marginTop: '16px', color: '#94a3b8', textAlign: 'center', lineHeight: '1.6' }}>
                                                    {results.summary}
                                                </p>
                                            </div>

                                            {/* Skill Gaps Warning */}
                                            {results.skillGaps && (
                                                <div style={{
                                                    background: 'rgba(251, 191, 36, 0.1)',
                                                    borderRadius: '12px',
                                                    padding: '16px',
                                                    border: '1px solid rgba(251, 191, 36, 0.3)',
                                                    marginBottom: '24px'
                                                }}>
                                                    <h4 style={{ color: '#fbbf24', marginBottom: '8px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                        ⚠️ Honest Assessment
                                                    </h4>
                                                    <p style={{ color: '#fcd34d', fontSize: '14px', lineHeight: '1.6' }}>
                                                        {results.skillGaps}
                                                    </p>
                                                </div>
                                            )}

                                            {/* Download Button */}
                                            <button
                                                onClick={() => downloadPDF(results.tailoredResume)}
                                                style={{
                                                    width: '100%',
                                                    padding: '14px 24px',
                                                    borderRadius: '10px',
                                                    border: 'none',
                                                    background: 'linear-gradient(135deg, #6366f1, #8b5cf6)',
                                                    color: '#fff',
                                                    fontSize: '15px',
                                                    fontWeight: '600',
                                                    cursor: 'pointer',
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    justifyContent: 'center',
                                                    gap: '10px'
                                                }}
                                            >
                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                                                </svg>
                                                Download Tailored PDF
                                            </button>
                                        </div>

                                        {/* Main Content */}
                                        <div>
                                            {/* Keywords */}
                                            <div style={{
                                                background: '#0f0f23',
                                                borderRadius: '16px',
                                                padding: '24px',
                                                border: '1px solid #2a2a4a',
                                                marginBottom: '24px'
                                            }}>
                                                <h3 style={{ marginBottom: '16px', fontSize: '18px' }}>Keyword Analysis</h3>
                                                <KeywordPills
                                                    matched={results.keywordAnalysis?.matched || []}
                                                    missing={results.keywordAnalysis?.missing || []}
                                                />
                                            </div>

                                            {/* Suggested Changes */}
                                            <div>
                                                <h3 style={{ marginBottom: '16px', fontSize: '18px' }}>Suggested Changes</h3>
                                                {results.suggestedChanges?.map((change, i) => (
                                                    <ChangeCard key={i} change={change} />
                                                ))}
                                                {(!results.suggestedChanges || results.suggestedChanges.length === 0) && (
                                                    <p style={{ color: '#64748b' }}>No changes suggested - your resume is well-tailored!</p>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'preview' && (
                                    <ResumePreview resume={results.tailoredResume} />
                                )}
                            </div>
                        )}

                        {/* Footer */}
                        <footer style={{ marginTop: '64px', textAlign: 'center', color: '#64748b', fontSize: '14px' }}>
                            <p>All processing happens in your browser. Your data is never stored.</p>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
